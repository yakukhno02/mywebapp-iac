---
services:

  web:
    container_name: mywebapp
    image: ghcr.io/yakukhno02/mywebapp:latest
    networks:
      - my_network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://192.168.252.10:5432/mywebapp
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 5000
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - my_network

networks:
  my_network:
